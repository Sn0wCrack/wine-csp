name: Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Wine ${{ matrix.version }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        version: [11.4, 11.11]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget xz-utils bubblewrap autoconf \
            libtool pkg-config meson ninja-build \
            gcc g++ gcc-mingw-w64 g++-mingw-w64 \
            python3 python3-pip cmake ccache

      - name: Build Wine CSP ${{ matrix.version }}
        run: |
          WINE_VERSION=${{ matrix.version }} ./build-wine-csp.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wine-csp-${{ matrix.version }}
          path: wine-csp-${{ matrix.version }}-*.tar.xz
          retention-days: 90

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.version }}
          path: |
            ${{ github.workspace }}/build-wine-csp*.log
            /tmp/wine-tkg-build-*.log
          retention-days: 30

  release:
    name: Upload to release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Upload tarballs to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*/*.tar.xz
