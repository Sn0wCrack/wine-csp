name: Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Wine ${{ matrix.version }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        version: [11.4, 11.11]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Download bootstrap (64-bit)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bootstraps.yml
          workflow_conclusion: success
          name: bootstrap-amd64
          path: /tmp/bootstraps/amd64

      - name: Download bootstrap (32-bit)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bootstraps.yml
          workflow_conclusion: success
          name: bootstrap-i386
          path: /tmp/bootstraps/i386

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap wget xz-utils autoconf pkg-config

      - name: Extract bootstraps
        run: |
          sudo mkdir -p /opt/chroots
          find /tmp/bootstraps -name 'bootstraps.tar.xz' -exec sudo tar -I "xz" -xpf {} -C /opt \;

      - name: Build Wine CSP ${{ matrix.version }}
        run: |
          WINE_VERSION=${{ matrix.version }} ./build-wine-csp.sh

      - name: List tarballs
        run: ls -la wine-csp-*.tar.xz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wine-csp-${{ matrix.version }}
          path: wine-csp-${{ matrix.version }}-*.tar.xz
          retention-days: 90

  release:
    name: Upload to release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Upload tarballs to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*/*.tar.xz
