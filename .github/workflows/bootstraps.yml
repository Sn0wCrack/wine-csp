name: Generate Bootstrap

on:
  schedule:
    - cron: 0 0 1 */2 *
  workflow_dispatch:

jobs:
  build:
    name: Bootstrap ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64, i386]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Create bootstraps
        env:
          BOOTSTRAP_ARCH: ${{ matrix.arch }}
        run: |
          set -e
          sudo apt update
          sudo apt install -y debootstrap perl bubblewrap
          sudo --preserve-env=BOOTSTRAP_ARCH ./create-ubuntu-bootstraps.sh
          cd /opt
          sudo tar -I "xz -T0 -9" -cpf bootstraps.tar.xz chroots
          sha256sum bootstraps.tar.xz
      - uses: actions/upload-artifact@v7
        with:
          name: bootstrap-${{ matrix.arch }}
          path: /opt/bootstraps.tar.xz
          retention-days: 90
